<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Classifier - Dog vs Cat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <header>
        <h1>🐾 Animal Classifier</h1>
        <p>Is it a Dog or a Cat?</p>
        <button id="theme-toggle">Switch Theme</button>
    </header>
    
    <main>
        <div class="card main-card">
            <div id="loading-overlay" class="overlay">
                <div class="spinner"></div>
                <p>Loading Model...</p>
            </div>
            
            <div class="input-section">
                <div id="webcam-container"></div>
                <img id="image-preview" src="#" alt="Preview" style="display: none;">
                
                <div class="controls">
                    <button id="start-webcam" class="btn primary">Start Camera</button>
                    <div class="file-upload">
                        <label for="image-upload" class="btn secondary">Upload Image</label>
                        <input type="file" id="image-upload" accept="image/*" style="display: none;">
                    </div>
                </div>
            </div>

            <div id="label-container" class="result-section">
                <!-- Predictions will be injected here -->
            </div>
        </div>

        <section id="partnership-section" class="card">
            <h2>제휴 문의</h2>
            <form id="partnership-form" action="https://formspree.io/f/mlgwaoae" method="POST">
                <div class="form-group">
                    <label for="name">이름/회사명</label>
                    <input type="text" id="name" name="name" required placeholder="이름 또는 회사명을 입력하세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해 주세요"></textarea>
                </div>
                <button type="submit" id="submit-btn" class="btn primary">문의하기</button>
            </form>
        </section>

        <section id="comments-section">
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-ftx7dllmxg.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
